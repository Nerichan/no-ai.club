<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Привет!</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">

    <style>
        body {
            /* Делаем фон светло-голубым или любым другим */
            background-color: #f0f8ff; 
            /* Располагаем контент ровно по центру экрана */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            /* Применяем шрифт Lobster */
            font-family: 'Lobster', cursive;
            font-size: 5rem; /* Размер шрифта */
            color: #2c3e50; /* Цвет текста */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1); /* Легкая тень */
            text-align: center;
        }

        /* Адаптация для мобильных телефонов */
        @media (max-width: 600px) {
            h1 {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>

    <h1>Всем привет!</h1>

</body>
</html>
